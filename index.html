<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS 企業級庫存戰情室</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script> <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, increment, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // ★★★ 請在此填入您的 Firebase Config ★★★
        const firebaseConfig = {
            const firebaseConfig = {
            apiKey: "AIzaSyD42okuxyOdqSJ8nAVtEwlu0PspzxK45Wk",
            authDomain: "myhomestock.firebaseapp.com",
            projectId: "myhomestock",
            storageBucket: "myhomestock.firebasestorage.app",
            messagingSenderId: "1017079171143",
            appId: "1:1017079171143:web:cf575190e3954093e80962"
        };

        window.app = initializeApp(firebaseConfig);
        window.db = getFirestore(window.app);
        window.collection = collection;
        window.addDoc = addDoc;
        window.getDocs = getDocs;
        window.updateDoc = updateDoc;
        window.doc = doc;
        window.increment = increment;
        window.query = query;
        window.where = where;
    </script>

    <style>
        /* 玻璃擬態質感 */
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        body { background-color: #f3f4f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 元件：KPI 數據卡片 ---
        const KPICard = ({ title, value, icon, color, subtext }) => (
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between transition hover:shadow-md">
                <div>
                    <p className="text-gray-500 text-sm font-semibold uppercase tracking-wider">{title}</p>
                    <h3 className="text-3xl font-bold text-gray-800 mt-1">{value}</h3>
                    <p className={`text-xs mt-2 font-medium ${color === 'red' ? 'text-red-500' : 'text-green-500'}`}>
                        {subtext}
                    </p>
                </div>
                <div className={`p-4 rounded-full bg-opacity-10 ${color === 'blue' ? 'bg-blue-500 text-blue-600' : color === 'red' ? 'bg-red-500 text-red-600' : 'bg-green-500 text-green-600'}`}>
                    <i className={`fas ${icon} text-2xl`}></i>
                </div>
            </div>
        );

        // --- 主程式：企業級 WMS ---
        function App() {
            const [view, setView] = useState('dashboard'); // dashboard, inbound, inventory
            const [inventory, setInventory] = useState([]);
            const [loading, setLoading] = useState(false);
            const [scanResult, setScanResult] = useState("");
            const [stats, setStats] = useState({ totalItems: 0, totalValue: 0, lowStock: 0 });

            // 初始化載入數據
            useEffect(() => {
                fetchData();
            }, []);

            const fetchData = async () => {
                setLoading(true);
                try {
                    // 這裡模擬從 Firebase 抓取數據 (需配合上方的 window.db)
                    // 為了展示效果，若無數據會顯示預設值
                    if(window.db) {
                        const querySnapshot = await window.getDocs(window.collection(window.db, "inventory"));
                        let items = [];
                        let totalQ = 0;
                        let low = 0;
                        querySnapshot.forEach((doc) => {
                            const d = doc.data();
                            items.push({ id: doc.id, ...d });
                            totalQ += d.qty;
                            // 簡單判斷過期
                            const daysLeft = (new Date(d.expiryDate) - new Date()) / (1000 * 60 * 60 * 24);
                            if(daysLeft < 30) low++;
                        });
                        setInventory(items);
                        setStats({ totalItems: totalQ, totalValue: items.length * 100, lowStock: low });
                    }
                } catch(e) { console.error(e); }
                setLoading(false);
            };

            // 掃碼處理 (模擬)
            const handleScan = () => {
                const scanner = new Html5Qrcode("reader");
                scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
                    (decodedText) => {
                        setScanResult(decodedText);
                        scanner.stop();
                        document.getElementById("reader").innerHTML = "";
                    }
                );
            };

            const handleInbound = async (e) => {
                e.preventDefault();
                const name = e.target.name.value;
                const qty = parseInt(e.target.qty.value);
                const date = e.target.date.value;
                
                if(!window.db) return alert("請先設定 Firebase Config");

                await window.addDoc(window.collection(window.db, "inventory"), {
                    barcode: scanResult || "MANUAL",
                    name: name,
                    qty: qty,
                    expiryDate: date,
                    location: "A-01", // 預設倉位
                    timestamp: new Date()
                });
                alert("入庫完成");
                fetchData();
                setView('dashboard');
            };

            // --- 視圖 1: 儀表板 ---
            const DashboardView = () => (
                <div className="space-y-6 animate-fade-in-up">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <KPICard title="總庫存數量" value={stats.totalItems} icon="fa-boxes" color="blue" subtext="現有商品總數" />
                        <KPICard title="庫存警示" value={stats.lowStock} icon="fa-exclamation-triangle" color="red" subtext="30天內到期或缺貨" />
                        <KPICard title="系統狀態" value="Online" icon="fa-server" color="green" subtext="Firebase 連線正常" />
                    </div>

                    {/* 這裡可以放圖表 (Chart.js 容器) */}
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <h3 className="text-lg font-bold text-gray-800 mb-4">庫存趨勢分析</h3>
                        <div className="h-64 bg-gray-50 flex items-center justify-center text-gray-400">
                            [ 專業圖表區域 - 需累積數據後顯示 ]
                        </div>
                    </div>
                </div>
            );

            // --- 視圖 2: 入庫操作 ---
            const InboundView = () => (
                <div className="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
                    <h2 className="text-2xl font-bold mb-6 text-gray-800 border-b pb-4">📦 標準入庫流程</h2>
                    
                    <div id="reader" className="w-full mb-4 rounded-lg overflow-hidden"></div>
                    <button onClick={handleScan} className="w-full mb-6 bg-gray-800 text-white py-3 rounded-lg hover:bg-gray-700 transition flex items-center justify-center gap-2">
                        <i className="fas fa-barcode"></i> 啟動掃描槍
                    </button>

                    <form onSubmit={handleInbound} className="space-y-4">
                        <div>
                            <label className="block text-sm font-medium text-gray-700">條碼 ID</label>
                            <input type="text" value={scanResult} readOnly className="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg text-gray-900 focus:ring-blue-500 focus:border-blue-500" placeholder="等待掃描..." />
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700">產品名稱</label>
                                <input name="name" type="text" required className="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500" placeholder="例如: 衛生紙" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700">入庫數量</label>
                                <input name="qty" type="number" defaultValue="1" className="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500" />
                            </div>
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700">有效日期 (Expiry)</label>
                            <input name="date" type="date" required className="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500" />
                        </div>
                        <button type="submit" className="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-lg shadow-blue-500/30">
                            確認入庫 (Confirm)
                        </button>
                    </form>
                </div>
            );

            // --- 視圖 3: 庫存總表 ---
            const InventoryView = () => (
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                        <h3 className="text-lg font-bold text-gray-800">SKU 列表 ({inventory.length})</h3>
                        <button onClick={fetchData} className="text-blue-600 hover:text-blue-800 text-sm font-bold"><i className="fas fa-sync-alt"></i> 刷新</button>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="w-full text-sm text-left text-gray-500">
                            <thead className="text-xs text-gray-700 uppercase bg-gray-50">
                                <tr>
                                    <th className="px-6 py-3">產品名稱</th>
                                    <th className="px-6 py-3">數量</th>
                                    <th className="px-6 py-3">效期</th>
                                    <th className="px-6 py-3">狀態</th>
                                </tr>
                            </thead>
                            <tbody>
                                {inventory.map((item) => (
                                    <tr key={item.id} className="bg-white border-b hover:bg-gray-50">
                                        <td className="px-6 py-4 font-medium text-gray-900">{item.name}</td>
                                        <td className="px-6 py-4">{item.qty}</td>
                                        <td className="px-6 py-4">{item.expiryDate}</td>
                                        <td className="px-6 py-4">
                                            <span className={`px-2 py-1 rounded text-xs font-bold ${item.qty < 3 ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800'}`}>
                                                {item.qty < 3 ? '低庫存' : '正常'}
                                            </span>
                                        </td>
                                    </tr>
                                ))}
                                {inventory.length === 0 && (
                                    <tr><td colSpan="4" className="text-center py-8 text-gray-400">目前無庫存數據</td></tr>
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );

            // --- 主介面佈局 ---
            return (
                <div className="flex h-screen overflow-hidden">
                    {/* 側邊欄 (Sidebar) */}
                    <div className="w-64 bg-gray-900 text-white hidden md:flex flex-col">
                        <div className="p-6 text-2xl font-bold tracking-tighter flex items-center gap-2">
                            <i className="fas fa-cube text-blue-500"></i> PRO<span className="text-blue-500">WMS</span>
                        </div>
                        <nav className="flex-1 px-4 space-y-2 mt-4">
                            <button onClick={() => setView('dashboard')} className={`w-full text-left px-4 py-3 rounded-lg transition flex items-center gap-3 ${view === 'dashboard' ? 'bg-blue-600 shadow-lg shadow-blue-900/50' : 'hover:bg-gray-800 text-gray-400'}`}>
                                <i className="fas fa-tachometer-alt"></i> 戰情總覽
                            </button>
                            <button onClick={() => setView('inbound')} className={`w-full text-left px-4 py-3 rounded-lg transition flex items-center gap-3 ${view === 'inbound' ? 'bg-blue-600 shadow-lg shadow-blue-900/50' : 'hover:bg-gray-800 text-gray-400'}`}>
                                <i className="fas fa-dolly"></i> 入庫作業
                            </button>
                            <button onClick={() => setView('inventory')} className={`w-full text-left px-4 py-3 rounded-lg transition flex items-center gap-3 ${view === 'inventory' ? 'bg-blue-600 shadow-lg shadow-blue-900/50' : 'hover:bg-gray-800 text-gray-400'}`}>
                                <i className="fas fa-list"></i> 庫存報表
                            </button>
                        </nav>
                        <div className="p-4 border-t border-gray-800 text-xs text-gray-500 text-center">
                            Enterprise Edition v2.0
                        </div>
                    </div>

                    {/* 手機版底部導航 (Mobile Nav) */}
                    <div className="md:hidden fixed bottom-0 w-full bg-white border-t z-50 flex justify-around py-3 text-xs shadow-[0_-5px_10px_rgba(0,0,0,0.05)]">
                        <button onClick={() => setView('dashboard')} className={`flex flex-col items-center ${view === 'dashboard' ? 'text-blue-600' : 'text-gray-400'}`}>
                            <i className="fas fa-tachometer-alt text-xl mb-1"></i> 總覽
                        </button>
                        <button onClick={() => setView('inbound')} className={`flex flex-col items-center ${view === 'inbound' ? 'text-blue-600' : 'text-gray-400'}`}>
                            <i className="fas fa-plus-circle text-4xl -mt-6 bg-white rounded-full text-blue-600 shadow-lg"></i>
                        </button>
                        <button onClick={() => setView('inventory')} className={`flex flex-col items-center ${view === 'inventory' ? 'text-blue-600' : 'text-gray-400'}`}>
                            <i className="fas fa-list text-xl mb-1"></i> 列表
                        </button>
                    </div>

                    {/* 主內容區 */}
                    <div className="flex-1 flex flex-col overflow-hidden relative">
                        {/* 頂部導航 */}
                        <header className="h-16 bg-white shadow-sm border-b border-gray-100 flex items-center justify-between px-6 z-10">
                            <h1 className="text-xl font-bold text-gray-800 capitalize">{view === 'dashboard' ? '戰情總覽' : view === 'inbound' ? '入庫作業' : '庫存報表'}</h1>
                            <div className="flex items-center gap-4">
                                <div className="hidden md:block text-right">
                                    <p className="text-sm font-bold text-gray-800">管理員</p>
                                    <p className="text-xs text-gray-500">Warehouse Admin</p>
                                </div>
                                <div className="h-10 w-10 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500"></div>
                            </div>
                        </header>

                        {/* 內容滾動區 */}
                        <main className="flex-1 overflow-y-auto p-4 md:p-8 pb-24">
                            {view === 'dashboard' && <DashboardView />}
                            {view === 'inbound' && <InboundView />}
                            {view === 'inventory' && <InventoryView />}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
