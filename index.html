<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StockMaster V4.0 (救命版)</title>
    
    <script>
        window.onerror = function(msg, url, line) {
            alert("網頁發生錯誤:\n" + msg + "\n行數: " + line);
            return false;
        };
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, increment, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyD42okuxyOdqSJ8nAVtEwlu0PspzxK45Wk",
            authDomain: "myhomestock.firebaseapp.com",
            projectId: "myhomestock",
            storageBucket: "myhomestock.firebasestorage.app",
            messagingSenderId: "1017079171143",
            appId: "1:1017079171143:web:cf575190e3954093e80962"
        };

        try {
            const app = initializeApp(firebaseConfig);
            window.db = getFirestore(app);
            // 把 Firebase 功能綁定到 window 讓 React 可以用
            window.firebaseOps = { collection, addDoc, getDocs, updateDoc, deleteDoc, doc, increment, query, where };
            console.log("Firebase OK");
        } catch(e) {
            alert("Firebase 連線失敗: " + e.message);
        }
    </script>

    <style>
        body { background-color: #f3f4f6; }
        /* 強制掃描框樣式 */
        #reader { 
            width: 100%; 
            height: 350px; 
            background-color: #000000; 
            margin-bottom: 20px;
            position: relative;
        }
        /* 確保影片撐滿 */
        #reader video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 子元件：庫存列表
        const InventoryList = ({ items, onItemConsume, onRefresh }) => {
            return (
                <div className="bg-white rounded-lg shadow p-4 mb-20">
                    <div className="flex justify-between items-center mb-4">
                        <h3 className="font-bold text-lg">庫存清單 ({items.length})</h3>
                        <button onClick={onRefresh} className="text-blue-500 text-sm">重新整理</button>
                    </div>
                    {items.length === 0 ? (
                        <p className="text-gray-400 text-center py-4">目前沒有資料</p>
                    ) : (
                        items.map(item => (
                            <div key={item.id} className="border-b py-3 flex justify-between items-center">
                                <div>
                                    <div className="font-bold">{item.name}</div>
                                    <div className="text-xs text-gray-500">效期: {item.expiryDate}</div>
                                </div>
                                <div className="flex items-center gap-3">
                                    <span className="font-bold text-blue-600">x{item.qty}</span>
                                    <button onClick={() => onItemConsume(item)} className="bg-red-100 text-red-600 px-2 py-1 rounded text-xs">消耗</button>
                                </div>
                            </div>
                        ))
                    )}
                </div>
            );
        };

        // 主程式
        function App() {
            const [view, setView] = useState('home'); 
            const [inventory, setInventory] = useState([]);
            const [isScanning, setIsScanning] = useState(false);
            const scannerRef = useRef(null);

            // 讀取資料
            const fetchData = async () => {
                if (!window.db) return;
                try {
                    const { collection, getDocs } = window.firebaseOps;
                    const q = await getDocs(collection(window.db, "inventory"));
                    let items = [];
                    q.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
                    // 排序
                    items.sort((a, b) => new Date(a.expiryDate) - new Date(b.expiryDate));
                    setInventory(items);
                } catch(e) {
                    console.error(e);
                }
            };

            useEffect(() => { fetchData(); }, []);

            // 啟動掃描
            const startScan = () => {
                setIsScanning(true);
                // 延遲執行，確保 div 已經出現
                setTimeout(() => {
                    try {
                        const scanner = new Html5Qrcode("reader");
                        scannerRef.current = scanner;
                        scanner.start(
                            { facingMode: "environment" }, 
                            { fps: 10, qrbox: { width: 250, height: 150 } },
                            (decodedText) => {
                                // 掃描成功
                                handleScanSuccess(decodedText);
                                stopScan();
                            },
                            (err) => {}
                        );
                    } catch(e) {
                        alert("相機啟動錯誤: " + e);
                        setIsScanning(false);
                    }
                }, 300);
            };

            const stopScan = () => {
                if(scannerRef.current) {
                    scannerRef.current.stop().then(() => {
                        scannerRef.current.clear();
                        setIsScanning(false);
                    }).catch(err => setIsScanning(false));
                } else {
                    setIsScanning(false);
                }
            };

            // 掃描成功後的邏輯
            const handleScanSuccess = async (code) => {
                const { collection, query, where, getDocs, addDoc } = window.firebaseOps;
                
                // 查詢舊資料
                const q = query(collection(window.db, "inventory"), where("barcode", "==", code));
                const snap = await getDocs(q);
                let defaultName = snap.empty ? "" : snap.docs[0].data().name;

                // 彈出視窗
                const { value: formValues } = await Swal.fire({
                    title: '📦 入庫',
                    html: `
                        <p class="mb-2 text-sm text-gray-500">條碼: ${code}</p>
                        <input id="swal-name" class="swal2-input" placeholder="產品名稱" value="${defaultName}">
                        <input id="swal-date" type="date" class="swal2-input">
                        <input id="swal-qty" type="number" class="swal2-input" placeholder="數量" value="1">
                    `,
                    focusConfirm: false,
                    preConfirm: () => [
                        document.getElementById('swal-name').value,
                        document.getElementById('swal-date').value,
                        document.getElementById('swal-qty').value
                    ]
                });

                if (formValues) {
                    const [name, date, qty] = formValues;
                    if(name && date) {
                        await addDoc(collection(window.db, "inventory"), {
                            barcode: code, name, expiryDate: date, qty: parseInt(qty), timestamp: new Date()
                        });
                        Swal.fire("成功", "已入庫", "success");
                        fetchData();
                    }
                }
            };

            // 消耗邏輯
            const handleConsume = async (item) => {
                const { deleteDoc, updateDoc, doc, increment } = window.firebaseOps;
                const result = await Swal.fire({ title: `消耗 ${item.name}?`, showCancelButton: true });
                if (result.isConfirmed) {
                    if (item.qty <= 1) await deleteDoc(doc(window.db, "inventory", item.id));
                    else await updateDoc(doc(window.db, "inventory", item.id), { qty: increment(-1) });
                    fetchData();
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-gray-50 pb-20">
                    {/* 頂部標題 */}
                    <div className="bg-blue-600 text-white p-4 shadow mb-4">
                        <h1 className="text-xl font-bold text-center">StockMaster V4.0</h1>
                    </div>

                    <div className="px-4">
                        {/* 1. 掃描區塊：如果有開啟才顯示 */}
                        {isScanning ? (
                            <div className="bg-black rounded-lg overflow-hidden shadow-lg mb-6">
                                <div id="reader"></div> {/* 這就是那個黑盒子 */}
                                <button onClick={stopScan} className="w-full py-3 bg-red-500 text-white font-bold">
                                    取消 / 關閉相機
                                </button>
                            </div>
                        ) : (
                            <button onClick={startScan} className="w-full py-4 bg-blue-600 text-white rounded-lg shadow-lg mb-6 text-lg font-bold flex items-center justify-center gap-2">
                                <i className="fas fa-camera"></i> 點擊啟動掃描
                            </button>
                        )}

                        {/* 2. 庫存列表 */}
                        <InventoryList items={inventory} onItemConsume={handleConsume} onRefresh={fetchData} />
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
